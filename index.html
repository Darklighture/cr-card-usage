<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>皇室战争 · 卡牌使用率聚焦 · Clash Royale · Card Usage Focus</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(145deg, #eef2f6, #e0e8ec);
            font-family: 'Inter', -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 24px;
        }
        .dashboard {
            max-width: 1200px;
            width: 100%;
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(20px);
            border-radius: 36px;
            box-shadow: 0 20px 40px -12px rgba(0,20,30,0.3);
            padding: 28px 30px;
            border: 1px solid rgba(255,255,255,0.6);
        }
        .header {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 20px;
            margin-bottom: 24px;
        }
        .selector-group {
            display: flex;
            align-items: center;
            gap: 15px;
            background: white;
            padding: 10px 25px;
            border-radius: 50px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
        }
        .selector-group label {
            font-weight: 600;
            color: #1e4b5a;
        }
        select {
            background: #eef7fa;
            border: 1px solid #b0d0da;
            border-radius: 30px;
            padding: 8px 18px;
            font-size: 1rem;
            font-weight: 500;
            color: #0e3b4a;
            cursor: pointer;
            outline: none;
        }
        .card-info {
            margin-left: auto;
            background: #d2e7ed;
            border-radius: 40px;
            padding: 8px 20px 8px 8px;
            font-size: 1.2rem;
            font-weight: 600;
            color: #134753;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .card-icon {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #c8dde4;
            object-fit: cover;
            border: 2px solid white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        .avg-badge {
            background: #1e4b5a;
            color: white;
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 1.1rem;
        }
        .lang-switch {
            display: flex;
            gap: 8px;
            background: white;
            padding: 6px 12px;
            border-radius: 40px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }
        .lang-btn {
            border: none;
            background: transparent;
            padding: 4px 12px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            color: #1e4b5a;
            transition: 0.2s;
        }
        .lang-btn.active {
            background: #1e4b5a;
            color: white;
        }
        .chart-container {
            width: 100%;
            height: 500px;
            background: #ffffff;
            border-radius: 28px;
            box-shadow: inset 0 1px 6px rgba(0,0,0,0.02), 0 12px 28px rgba(0,0,0,0.05);
            padding: 10px;
            margin-top: 10px;
            position: relative;
        }
        #chart {
            width: 100%;
            height: 100%;
        }
        .note {
            text-align: center;
            font-size: 0.85rem;
            color: #527e8c;
            margin-top: 12px;
        }
    </style>
</head>
<body>
<div class="dashboard">
    <div class="header">
        <div class="selector-group">
            <label id="typeLabel" for="typeSelect">卡牌类型：</label>
            <select id="typeSelect"></select>
            <label id="cardLabel" for="cardSelect">选择卡牌：</label>
            <select id="cardSelect" style="min-width: 160px;"></select>
        </div>
        <div class="lang-switch">
            <button id="langZh" class="lang-btn active">中文</button>
            <button id="langEn" class="lang-btn">English</button>
        </div>
        <div class="card-info">
            <img id="cardIcon" src="" alt="card icon" class="card-icon">
            <span class="avg-badge" id="avgDisplay">平均 0.0%</span>
        </div>
    </div>

    <div class="chart-container">
        <div id="chart"></div>
    </div>
    <div class="note" id="noteText">📅  卡牌使用率数据根据各赛季天梯topk玩家卡组整理</div>
</div>

<script>
(async function() {
    "use strict";

    // ---------- 语言包 ----------
    const LANG = {
        zh: {
            typeLabel: '卡牌类型：',
            cardLabel: '选择卡牌：',
            avgPrefix: '平均',
            note: '📅  卡牌使用率数据根据各赛季天梯topk玩家卡组整理',
            categories: {
                core: '核心', spell: '法术', building: '建筑', melee: '近战',
                ranged: '远程', air: '空军', hero: '英雄', evo: '进化', tower: '塔楼'
            },
            usageSuffix: '%'
        },
        en: {
            typeLabel: 'Card Type:',
            cardLabel: 'Select Card:',
            avgPrefix: 'Avg',
            note: '📅  Card usage data is compiled based on the decks of top players in the ladder each season.',
            categories: {
                core: 'Win-condition', spell: 'Spell', building: 'Building', melee: 'Melee',
                ranged: 'Ranged', air: 'Air', hero: 'Hero', evo: 'Evolution', tower: 'Tower'
            },
            usageSuffix: '%'
        }
    };

    // ---------- 时间轴定义 ----------
    const MONTHS_60 = (() => { let arr = []; for (let y = 2021; y <= 2026; y++) { for (let m = 1; m <= 12; m++) { if (y === 2026 && m > 1) break; if (y === 2023 && m === 4) continue; arr.push(`${y}-${String(m).padStart(2,'0')}`); } } return arr; })();
    const MONTHS_32 = (() => { let arr = []; for (let y = 2023; y <= 2026; y++) { for (let m = 1; m <= 12; m++) { if (y === 2026 && m > 1) break; if (y === 2023 && m < 6) continue; arr.push(`${y}-${String(m).padStart(2,'0')}`); } } return arr; })();
    const MONTHS_50 = (() => { let arr = []; for (let y = 2021; y <= 2026; y++) { for (let m = 1; m <= 12; m++) { if (y === 2026 && m > 1) break; if (y === 2023 && m === 4) continue; if (y === 2021 && m < 11) continue; arr.push(`${y}-${String(m).padStart(2,'0')}`); } } return arr; })();
    const MONTHS_25 = (() => { let arr = []; for (let y = 2024; y <= 2026; y++) { for (let m = 1; m <= 12; m++) { if (y === 2026 && m > 1) break; arr.push(`${y}-${String(m).padStart(2,'0')}`); } } return arr; })();

    const ICON_BASE_PATH = './icon/';

    // ---------- 全局状态与动态数据配置 ----------
    let currentLang = 'zh';
    let currentType = 'core';
    let currentCard = '';
    
    // 这些变量将由 JSON 数据填充
    let CATEGORY_CONFIG = {};
    let CARD_ICON_MAP = {};
    let cardNameEN = {};

    // DOM 元素
    const typeSelect = document.getElementById('typeSelect');
    const cardSelect = document.getElementById('cardSelect');
    const cardIcon = document.getElementById('cardIcon');
    const avgDisplay = document.getElementById('avgDisplay');
    const chartDom = document.getElementById('chart');
    const noteText = document.getElementById('noteText');
    const langZhBtn = document.getElementById('langZh');
    const langEnBtn = document.getElementById('langEn');
    const typeLabel = document.getElementById('typeLabel');
    const cardLabel = document.getElementById('cardLabel');

    const myChart = echarts.init(chartDom);

    // 辅助：计算平均使用率
    function calcAverage(data) {
        let sum = 0, count = 0;
        for (let i = 0; i < data.length; i++) {
            if (data[i] !== null && data[i] !== undefined) {
                sum += data[i];
                count++;
            }
        }
        return count > 0 ? (sum / count).toFixed(1) : '0.0';
    }

    // 更新界面语言
    function updateUILanguage() {
        const lang = LANG[currentLang];
        typeLabel.innerText = lang.typeLabel;
        cardLabel.innerText = lang.cardLabel;
        noteText.innerText = lang.note;

        const order = ['core', 'spell', 'building', 'melee', 'ranged', 'air', 'hero', 'evo', 'tower'];
        typeSelect.innerHTML = order.map(key => `<option value="${key}">${lang.categories[key]}</option>`).join('');
        typeSelect.value = currentType;

        langZhBtn.classList.toggle('active', currentLang === 'zh');
        langEnBtn.classList.toggle('active', currentLang === 'en');
    }

    // 更新卡牌下拉选项
    function updateCardSelect() {
        if (!CATEGORY_CONFIG[currentType]) return;
        const cfg = CATEGORY_CONFIG[currentType];
        const cards = cfg.cards;
        
        const options = Object.keys(cards).sort((a, b) => {
            const nameA = (currentLang === 'en' && cardNameEN[a]) ? cardNameEN[a] : a;
            const nameB = (currentLang === 'en' && cardNameEN[b]) ? cardNameEN[b] : b;
            return nameA.localeCompare(nameB, currentLang === 'zh' ? 'zh-CN' : undefined);
        }).map(cn => {
            const displayName = (currentLang === 'en' && cardNameEN[cn]) ? cardNameEN[cn] : cn;
            return `<option value="${cn}">${displayName}</option>`;
        }).join('');
        
        cardSelect.innerHTML = options;
        if (!currentCard || !cards[currentCard]) {
            currentCard = cardSelect.value;
        } else {
            cardSelect.value = currentCard;
        }
        renderChart();
    }

    // 渲染图表
    function renderChart() {
        if (!CATEGORY_CONFIG[currentType]) return;
        const cfg = CATEGORY_CONFIG[currentType];
        const card = cfg.cards[currentCard];
        if (!card) return;

        const months = cfg.months;
        const avg = calcAverage(card.data);
        avgDisplay.innerText = LANG[currentLang].avgPrefix + ' ' + avg + LANG[currentLang].usageSuffix;

        const iconFile = CARD_ICON_MAP[currentCard] || 'default-v2.png';
        cardIcon.src = ICON_BASE_PATH + iconFile;
        cardIcon.onerror = function() { this.src = ''; this.style.backgroundColor = '#ccc'; };

        const seriesName = (currentLang === 'en' && cardNameEN[currentCard]) ? cardNameEN[currentCard] : currentCard;

        const option = {
            tooltip: {
                trigger: 'axis',
                axisPointer: { type: 'shadow' },
                formatter: function(params) {
                    var p = params[0];
                    var val = p.value;
                    return p.name + '<br/>' + p.marker + p.seriesName + ': ' + (val != null ? val + '%' : 'N/A');
                }
            },
            grid: { left: '7%', right: '7%', bottom: '12%', top: '10%' },
            xAxis: {
                type: 'category', data: months, axisTick: { show: false },
                axisLabel: { interval: 5, rotate: 45, fontSize: 9, margin: 12, color: '#4a6a78' },
                axisLine: { lineStyle: { color: '#b0d0da' } }
            },
            yAxis: {
                type: 'value', name: currentLang === 'zh' ? '使用率 %' : 'Usage %',
                nameStyle: { fontSize: 11, color: '#2d6b7a' },
                splitLine: { lineStyle: { color: '#e6f0f2', type: 'dashed', width: 0.8 } },
                axisLabel: { fontSize: 10 }
            },
            series: [{
                name: seriesName, type: 'line', data: card.data, symbol: 'none',
                lineStyle: { width: 2.5, color: card.color }, connectNulls: false,
                areaStyle: { color: card.color, opacity: 0.1 },
                markLine: {
                    silent: true, lineStyle: { color: '#333', type: 'dashed', width: 1 },
                    label: { show: true, position: 'end', formatter: LANG[currentLang].avgPrefix },
                    data: [{ yAxis: parseFloat(avg) }]
                }
            }],
            backgroundColor: '#ffffff',
            dataZoom: [{ type: 'inside', start: 0, end: 100 }]
        };
        myChart.setOption(option, { notMerge: false });
    }

    // 事件监听
    typeSelect.addEventListener('change', function(e) {
        currentType = e.target.value;
        currentCard = Object.keys(CATEGORY_CONFIG[currentType].cards)[0] || '';
        updateCardSelect();
    });

    cardSelect.addEventListener('change', function(e) {
        currentCard = e.target.value;
        renderChart();
    });

    function setLanguage(lang) {
        if (lang === currentLang) return;
        currentLang = lang;
        updateUILanguage();
        updateCardSelect();   
    }

    langZhBtn.addEventListener('click', () => setLanguage('zh'));
    langEnBtn.addEventListener('click', () => setLanguage('en'));
    window.addEventListener('resize', () => myChart.resize());

    // ---------- 核心：异步加载数据 ----------
    try {
        // 显示加载提示
        myChart.showLoading({ text: '正在加载数据...', color: '#1e4b5a', textColor: '#1e4b5a', maskColor: 'rgba(255, 255, 255, 0.8)' });

        const res = await fetch('data.json');
        if (!res.ok) throw new Error('数据请求失败，状态码: ' + res.status);
        const data = await res.json();

        CARD_ICON_MAP = data.icons;

        // 生成英文名映射
        Object.entries(CARD_ICON_MAP).forEach(([cn, filename]) => {
            let en = filename.replace('-v2.png', '').replace(/-/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
            cardNameEN[cn] = en;
        });

        // 绑定类别配置
        CATEGORY_CONFIG = {
            spell: { months: MONTHS_60, cards: data.cards.spell, key: 'spell' },
            core: { months: MONTHS_60, cards: data.cards.core, key: 'core' },
            building: { months: MONTHS_60, cards: data.cards.building, key: 'building' },
            evo: { months: MONTHS_32, cards: data.cards.evo, key: 'evo' },
            melee: { months: MONTHS_60, cards: data.cards.melee, key: 'melee' },
            air: { months: MONTHS_60, cards: data.cards.air, key: 'air' },
            hero: { months: MONTHS_50, cards: data.cards.hero, key: 'hero' },
            ranged: { months: MONTHS_60, cards: data.cards.ranged, key: 'ranged' },
            tower: { months: MONTHS_25, cards: data.cards.tower, key: 'tower' }
        };

        // 初始化渲染
        myChart.hideLoading();
        updateUILanguage();
        updateCardSelect();

    } catch (error) {
        console.error('加载 JSON 数据失败:', error);
        myChart.hideLoading();
        chartDom.innerHTML = `<div style="text-align:center; padding-top: 50px; color: #b85450; font-weight: bold;">
            无法加载 data.json 数据。<br><br>
            <span style="font-size: 0.9em; color: #666; font-weight: normal;">
            注意：由于浏览器的安全限制(CORS)，直接双击打开 HTML 文件无法读取本地的 JSON 文件。<br>
            请使用本地服务器运行（例如在 VS Code 中使用 Live Server 插件）。
            </span>
        </div>`;
    }

})();
</script>
</body>
</html>
