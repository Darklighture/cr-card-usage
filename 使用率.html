<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(145deg, #eef2f6, #e0e8ec);
            font-family: 'Inter', -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 24px;
        }
        .dashboard {
            max-width: 1200px;
            width: 100%;
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(20px);
            border-radius: 36px;
            box-shadow: 0 20px 40px -12px rgba(0,20,30,0.3);
            padding: 28px 30px;
            border: 1px solid rgba(255,255,255,0.6);
        }
        .header {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 20px;
            margin-bottom: 24px;
        }
        .selector-group {
            display: flex;
            align-items: center;
            gap: 15px;
            background: white;
            padding: 10px 25px;
            border-radius: 50px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
        }
        .selector-group label {
            font-weight: 600;
            color: #1e4b5a;
        }
        select {
            background: #eef7fa;
            border: 1px solid #b0d0da;
            border-radius: 30px;
            padding: 8px 18px;
            font-size: 1rem;
            font-weight: 500;
            color: #0e3b4a;
            cursor: pointer;
            outline: none;
        }
        .card-info {
            margin-left: auto;
            background: #d2e7ed;
            border-radius: 40px;
            padding: 8px 20px 8px 8px;
            font-size: 1.2rem;
            font-weight: 600;
            color: #134753;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .card-icon {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #c8dde4;
            object-fit: cover;
            border: 2px solid white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        .avg-badge {
            background: #1e4b5a;
            color: white;
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 1.1rem;
        }
        .chart-container {
            width: 100%;
            height: 500px;
            background: #ffffff;
            border-radius: 28px;
            box-shadow: inset 0 1px 6px rgba(0,0,0,0.02), 0 12px 28px rgba(0,0,0,0.05);
            padding: 10px;
            margin-top: 10px;
        }
        #chart {
            width: 100%;
            height: 100%;
        }
        .note {
            text-align: center;
            font-size: 0.85rem;
            color: #527e8c;
            margin-top: 12px;
        }
    </style>
</head>

<div class="dashboard">
    <div class="header">
        <div class="selector-group">
            <label for="typeSelect">卡牌类型：</label>
            <select id="typeSelect">

                <option value="tower">塔楼 (4张)</option>

            <label for="cardSelect">选择卡牌：</label>
            <select id="cardSelect" style="min-width: 160px;"></select>
        </div>
        <div class="card-info">
            <img id="cardIcon" src="" alt="icon" class="card-icon">
            <span class="avg-badge" id="avgDisplay">平均 0.0%</span>

    <div class="chart-container">

    </div>

        core: { months: MONTHS_60, cards: CORE_CARDS, name: '核心' },
        building: { months: MONTHS_60, cards: BUILDING_CARDS, name: '建筑' },

    // ---------- 页面元素 ----------
    const typeSelect = document.getElementById('typeSelect');
    const cardSelect = document.getElementById('cardSelect');
    const cardIcon = document.getElementById('cardIcon');
    const avgDisplay = document.getElementById('avgDisplay');
    const chartDom = document.getElementById('chart');
    const myChart = echarts.init(chartDom);

    // 辅助：计算平均使用率（忽略null）
    function calcAverage(data) {
        let sum = 0, count = 0;
        for (let i = 0; i < data.length; i++) {
            if (data[i] !== null && data[i] !== undefined) {
                sum += data[i];
                count++;
            }
        }
        return count > 0 ? (sum / count).toFixed(1) : '0.0';
    }

    // 更新二级下拉选项
    function updateCardSelect(type) {
        const cfg = CATEGORY_CONFIG[type];
        const cards = cfg.cards;
        const options = Object.keys(cards).sort().map(name => `<option value="${name}">${name}</option>`).join('');
        cardSelect.innerHTML = options;
        // 触发更新图表
        renderChart(type, cardSelect.value);
    }

    // 渲染图表
    function renderChart(type, cardName) {
        const cfg = CATEGORY_CONFIG[type];
        const card = cfg.cards[cardName];
        if (!card) return;

        const months = cfg.months;
        const avg = calcAverage(card.data);
        avgDisplay.innerText = `平均 ${avg}%`;

        // 设置图标
        const iconFile = CARD_ICON_MAP[cardName] || 'default-v2.png';
        cardIcon.src = ICON_BASE_PATH + iconFile;
        cardIcon.onerror = function() {
            this.src = ''; 
            this.style.backgroundColor = '#ccc';
        };

        const option = {
            tooltip: {
                trigger: 'axis',
                axisPointer: { type: 'shadow' },
                formatter: function(params) {
        var p = params[0];
        var val = p.value;
        return p.name + '<br/>' + p.marker + p.seriesName + ': ' + 
               (val != null ? val + '%' : 'N/A');
                }
            },
            grid: { left: '7%', right: '7%', bottom: '12%', top: '10%' },
            xAxis: {
                type: 'category',
                data: months,
                axisTick: { show: false },
                axisLabel: { interval: 5, rotate: 45, fontSize: 9, margin: 12, color: '#4a6a78' },
                axisLine: { lineStyle: { color: '#b0d0da' } }
            },
            yAxis: {
                type: 'value',
                name: '使用率 %',
                nameStyle: { fontSize: 11, color: '#2d6b7a' },
                splitLine: { lineStyle: { color: '#e6f0f2', type: 'dashed', width: 0.8 } },
                axisLabel: { fontSize: 10 }
            },
            series: [{
                name: cardName,
                type: 'line',
                data: card.data,
                symbol: 'none',
                lineStyle: { width: 2.5, color: card.color },
                connectNulls: false,
                areaStyle: { color: card.color, opacity: 0.1 },
                markLine: {
                    silent: true,
                    lineStyle: { color: '#333', type: 'dashed', width: 1 },
                    label: { show: true, position: 'end', formatter: '平均' },
                    data: [{ yAxis: parseFloat(avg) }]
                }
            }],
            backgroundColor: '#ffffff',
            dataZoom: [{ type: 'inside', start: 0, end: 100 }]
        };
        myChart.setOption(option, { notMerge: false });
    }

    // 监听类型变化
    typeSelect.addEventListener('change', function(e) {
        updateCardSelect(e.target.value);
    });

    // 监听卡牌变化
    cardSelect.addEventListener('change', function(e) {
        renderChart(typeSelect.value, e.target.value);
    });

    // 初始化：默认选中法术
    updateCardSelect('spell');

    // 窗口自适应
    window.addEventListener('resize', () => myChart.resize());
